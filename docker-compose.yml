version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: social_auth_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-social_auth_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      MYSQL_USER: ${DB_USER:-django_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=TRADITIONAL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secure_password_123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - social_auth_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social_auth_backend
    restart: unless-stopped
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - DB_HOST=db
      - DB_PORT=3306
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME:-social_auth_db}
      - DB_USER=${DB_USER:-django_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - social_auth_network
    command: >
      sh -c "
        echo 'Waiting for database to be fully ready...' &&
        sleep 30 &&
        echo 'Database connection test...' &&
        python -c 'import django; django.setup(); from django.db import connection; connection.ensure_connection(); print(\"Database connected successfully!\")' &&
        echo 'Creating migrations...' &&
        python manage.py makemigrations &&
        echo 'Running database migrations...' &&
        python manage.py migrate &&
        echo 'Creating superuser if not exists...' &&
        python manage.py shell -c \"
        from django.contrib.auth import get_user_model;
        User = get_user_model();
        if not User.objects.filter(username='admin').exists():
            User.objects.create_superuser('admin', 'admin@example.com', 'admin123')
            print('Superuser created: admin/admin123')
        else:
            print('Superuser already exists')
        \" &&
        echo 'Collecting static files...' &&
        python manage.py collectstatic --noinput &&
        echo 'Starting development server...' &&
        python manage.py runserver 0.0.0.0:8000
      "

  nginx:
    image: nginx:alpine
    container_name: social_auth_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - backend
    networks:
      - social_auth_network

volumes:
  mysql_data:
  static_volume:
  media_volume:

networks:
  social_auth_network:
    driver: bridge